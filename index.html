<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Bucket List | Share Your Dreams</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="map-bg"></div>

    <main class="main-container">
        
        <header class="header">
            <h1 class="logo">GLOBAL BUCKET LIST</h1>
            <div class="live-status">
                <span class="pulse"></span>
                <p>1,240 Souls Dreaming Now</p>
            </div>
        </header>

        <section class="dream-box glass">
            <textarea id="dream-input" placeholder="What's your biggest dream?"></textarea>
            
            <div class="controls">
                <div class="options">
                    <select id="category">
                        <option value="travel">🌍 Travel</option>
                        <option value="career">🎓 Career</option>
                        <option value="love">❤️ Love</option>
                        <option value="money">💰 Money</option>
                    </select>
                    
                    <label class="anon-label">
                        <input type="checkbox" id="anon-check">
                        <span>Ghost Mode (Anonymous)</span>
                    </label>
                </div>
                
                <button id="pin-btn" onclick="showModal()">PIN IT</button>
            </div>
        </section>

        <aside class="ad-sidebar glass">
            <p>Sponsored</p>
            <div class="ad-placeholder">Ad Space</div>
        </aside>

    </main>

    <div id="user-modal" class="modal-overlay hidden">
        <div class="modal-card glass">
            <h2>Personalize Your Journey</h2>
            <p>Tell us a bit about you to connect with similar dreams.</p>
            
            <div class="input-group">
                <input type="number" placeholder="Your Age">
                <input type="text" placeholder="Interests (e.g. Tech, Music)">
            </div>

            <div class="modal-ad-box">
                <p>Trending Now</p>
                <div class="ad-banner">
                    Adsterra 300x250
                </div>
            </div>

            <button class="finish-btn" onclick="closeModal()">Explore The World</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
